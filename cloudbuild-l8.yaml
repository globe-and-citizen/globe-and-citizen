steps:
  # Install dependencies
  - name: node:20
    entrypoint: npm
    args: ["install"]

  # Build frontend
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        export VITE_API_BASE_URL="${_VITE_API_BASE_URL}"
        export VITE_FORWARD_PROXY_URL="${_VITE_FORWARD_PROXY_URL}"
        export VITE_LAYER8_BASE_URL_PROD="${_VITE_LAYER8_BASE_URL_PROD}"
        export VITE_LAYER8_ENABLED=${_VITE_LAYER8_ENABLED}

        npm run build

  # Deploy to Cloud Storage
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gsutil
    args: ["-m", "rsync", "-r", "dist/", "gs://l8.globeandcitizen.com"]

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
